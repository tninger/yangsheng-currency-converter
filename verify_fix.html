<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汇率修复验证</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-case { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .result { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>汇率修复验证</h1>
    <p>验证时间: 2026-04-21</p>
    
    <div class="test-case">
        <h3>测试1: index.html 汇率计算</h3>
        <p>使用修复后的currencies数组计算汇率转换</p>
        <div id="test1-result">计算中...</div>
    </div>
    
    <div class="test-case">
        <h3>测试2: app.js 备用汇率数据</h3>
        <p>验证备用汇率数据是否准确</p>
        <div id="test2-result">验证中...</div>
    </div>
    
    <div class="test-case">
        <h3>测试3: 实际API调用</h3>
        <p>测试当前汇率API是否可用</p>
        <div id="test3-result">测试中...</div>
    </div>
    
    <script>
        // 测试1: index.html 汇率计算
        function testIndexHtmlCalculation() {
            const currencies = [
                ['CNY', '人民币[中国¥]', 6.849315],
                ['USD', '美元[美国$]', 1.000000],
                ['EUR', '欧元[欧盟€]', 0.849315],
                ['JPY', '日元[日本¥]', 159.383562]
            ];
            
            const currencyMap = {};
            currencies.forEach(([code, name, rate]) => {
                currencyMap[code] = { name, rate };
            });
            
            // 测试转换
            function convert(amount, from, to) {
                const fromRate = currencyMap[from].rate;
                const toRate = currencyMap[to].rate;
                const baseUSD = amount / fromRate;
                return baseUSD * toRate;
            }
            
            const results = [];
            
            // 100 CNY -> USD
            const cnyToUsd = convert(100, 'CNY', 'USD');
            const expectedCnyToUsd = 14.60; // 100 * 0.146
            const diff1 = Math.abs(cnyToUsd - expectedCnyToUsd);
            results.push(`100 CNY → USD: ${cnyToUsd.toFixed(2)} (预期: ${expectedCnyToUsd.toFixed(2)}, 差异: ${diff1.toFixed(4)})`);
            
            // 100 USD -> CNY
            const usdToCny = convert(100, 'USD', 'CNY');
            const expectedUsdToCny = 684.93; // 100 * 6.8493
            const diff2 = Math.abs(usdToCny - expectedUsdToCny);
            results.push(`100 USD → CNY: ${usdToCny.toFixed(2)} (预期: ${expectedUsdToCny.toFixed(2)}, 差异: ${diff2.toFixed(4)})`);
            
            // 100 EUR -> USD
            const eurToUsd = convert(100, 'EUR', 'USD');
            const expectedEurToUsd = 117.74; // 100 * 1.1774
            const diff3 = Math.abs(eurToUsd - expectedEurToUsd);
            results.push(`100 EUR → USD: ${eurToUsd.toFixed(2)} (预期: ${expectedEurToUsd.toFixed(2)}, 差异: ${diff3.toFixed(4)})`);
            
            const allPass = diff1 < 0.01 && diff2 < 0.01 && diff3 < 0.01;
            
            const resultDiv = document.getElementById('test1-result');
            resultDiv.innerHTML = results.join('<br>');
            resultDiv.parentElement.className = allPass ? 'test-case success' : 'test-case error';
            resultDiv.innerHTML += `<br><strong>${allPass ? '✅ 所有测试通过' : '❌ 测试失败'}</strong>`;
            
            return allPass;
        }
        
        // 测试2: app.js 备用汇率数据
        function testAppJsFallback() {
            const fallbackRates = {
                CNY: 1,
                USD: 0.146,
                EUR: 0.124,
                GBP: 0.108,
                JPY: 23.27,
                HKD: 1.15,
                AUD: 0.205,
                CAD: 0.200,
                SGD: 0.186,
                KRW: 214.82
            };
            
            const currentApiRates = {
                USD: 0.146,
                EUR: 0.124,
                JPY: 23.27,
                HKD: 1.15,
                AUD: 0.205,
                CAD: 0.200,
                SGD: 0.186,
                KRW: 214.82
            };
            
            const results = [];
            let allMatch = true;
            
            Object.keys(currentApiRates).forEach(currency => {
                const fallback = fallbackRates[currency];
                const api = currentApiRates[currency];
                const match = Math.abs(fallback - api) < 0.001;
                
                if (!match) allMatch = false;
                
                results.push(`${currency}: ${fallback} (API: ${api}) ${match ? '✅' : '❌'}`);
            });
            
            const resultDiv = document.getElementById('test2-result');
            resultDiv.innerHTML = results.join('<br>');
            resultDiv.parentElement.className = allMatch ? 'test-case success' : 'test-case error';
            resultDiv.innerHTML += `<br><strong>${allMatch ? '✅ 所有备用汇率匹配API数据' : '❌ 部分汇率不匹配'}</strong>`;
            
            return allMatch;
        }
        
        // 测试3: 实际API调用
        async function testApiCall() {
            const resultDiv = document.getElementById('test3-result');
            
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/CNY');
                
                if (!response.ok) {
                    throw new Error(`API响应失败: ${response.status}`);
                }
                
                const data = await response.json();
                
                const keyRates = {
                    USD: data.rates.USD,
                    EUR: data.rates.EUR,
                    JPY: data.rates.JPY
                };
                
                const results = [];
                Object.entries(keyRates).forEach(([currency, rate]) => {
                    results.push(`${currency}: ${rate}`);
                });
                
                resultDiv.innerHTML = `
                    API状态: ✅ 可用<br>
                    基础货币: ${data.base}<br>
                    数据日期: ${data.date}<br>
                    关键汇率:<br>${results.join('<br>')}
                `;
                resultDiv.parentElement.className = 'test-case success';
                
                return true;
                
            } catch (error) {
                resultDiv.innerHTML = `API测试失败: ${error.message}`;
                resultDiv.parentElement.className = 'test-case error';
                return false;
            }
        }
        
        // 执行所有测试
        async function runAllTests() {
            const test1 = testIndexHtmlCalculation();
            const test2 = testAppJsFallback();
            const test3 = await testApiCall();
            
            const allPass = test1 && test2 && test3;
            
            const summary = document.createElement('div');
            summary.className = `test-case ${allPass ? 'success' : 'error'}`;
            summary.innerHTML = `
                <h3>测试总结</h3>
                <p>测试1 (index.html计算): ${test1 ? '✅ 通过' : '❌ 失败'}</p>
                <p>测试2 (app.js备用数据): ${test2 ? '✅ 通过' : '❌ 失败'}</p>
                <p>测试3 (API可用性): ${test3 ? '✅ 通过' : '❌ 失败'}</p>
                <p><strong>${allPass ? '✅ 所有测试通过 - 汇率错误问题已修复！' : '❌ 部分测试失败，需要进一步检查'}</strong></p>
            `;
            
            document.body.appendChild(summary);
        }
        
        // 启动测试
        runAllTests();
    </script>
</body>
</html>
