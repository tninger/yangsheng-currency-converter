<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多币种实时汇率换算器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💱</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .currency-icon { font-size: 48px; margin-bottom: 10px; }
        h1 { font-size: 28px; color: white; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.9); font-size: 16px; }
        
        .main-converter { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 30px; 
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .input-section { margin-bottom: 30px; }
        .input-label { display: block; margin-bottom: 10px; color: #555; font-weight: 500; }
        .input-row { display: flex; gap: 20px; align-items: center; }
        .amount-input { flex: 1; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 18px; font-weight: 500; }
        .currency-select { min-width: 200px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; background: white; cursor: pointer; }
        
        .multi-currency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .currency-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        
        .currency-card:hover {
            transform: translateY(-5px);
        }
        
        .currency-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .currency-flag { font-size: 32px; }
        .currency-info { flex: 1; }
        .currency-code { font-size: 20px; font-weight: 700; color: #333; }
        .currency-name { font-size: 14px; color: #666; margin-top: 4px; }
        
        .rate-display {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .rate-amount {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .rate-label {
            font-size: 14px;
            color: #666;
        }
        
        .converted-amounts {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .amount-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .amount-value {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .amount-label {
            font-size: 12px;
            color: #888;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
            border: 2px solid #e0e0e0;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
        }
        
        .last-updated {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 30px;
            padding: 15px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        
        .currency-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        
        .currency-tag {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .input-row { flex-direction: column; gap: 10px; }
            .currency-select { width: 100%; }
            .multi-currency-grid { grid-template-columns: 1fr; }
            .converted-amounts { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="currency-icon">💱</div>
            <h1>多币种实时汇率换算器</h1>
            <div class="subtitle">一次显示多种货币汇率，实时换算</div>
        </div>
        
        <div class="main-converter">
            <div class="input-section">
                <label class="input-label">输入金额（基准货币）</label>
                <div class="input-row">
                    <input type="number" class="amount-input" id="baseAmount" value="100" min="0" step="0.01" placeholder="输入金额">
                    <select class="currency-select" id="baseCurrency">
                        <option value="CNY">🇨🇳 人民币 (CNY)</option>
                        <option value="USD">🇺🇸 美元 (USD)</option>
                        <option value="EUR">🇪🇺 欧元 (EUR)</option>
                        <option value="GBP">🇬🇧 英镑 (GBP)</option>
                        <option value="JPY">🇯🇵 日元 (JPY)</option>
                    </select>
                </div>
            </div>
            
            <div class="multi-currency-grid" id="currencyGrid">
                <!-- 货币卡片将通过JavaScript动态生成 -->
            </div>
            
            <div class="controls">
                <button class="btn btn-secondary" id="resetBtn">
                    <span>🔄</span> 重置
                </button>
                <button class="btn btn-primary" id="refreshBtn">
                    <span>🔄</span> 刷新汇率
                </button>
            </div>
        </div>
        
        <div class="currency-list">
            <div class="currency-tag">🇨🇳 人民币 (CNY)</div>
            <div class="currency-tag">🇺🇸 美元 (USD)</div>
            <div class="currency-tag">🇪🇺 欧元 (EUR)</div>
            <div class="currency-tag">🇬🇧 英镑 (GBP)</div>
            <div class="currency-tag">🇯🇵 日元 (JPY)</div>
            <div class="currency-tag">🇭🇰 港币 (HKD)</div>
            <div class="currency-tag">🇦🇺 澳元 (AUD)</div>
            <div class="currency-tag">🇨🇦 加元 (CAD)</div>
            <div class="currency-tag">🇸🇬 新加坡元 (SGD)</div>
            <div class="currency-tag">🇰🇷 韩元 (KRW)</div>
        </div>
        
        <div class="last-updated" id="lastUpdated">
            最后更新: 正在获取最新汇率...
        </div>
    </div>

    <script>
        // 预设汇率数据（多币种）
        const exchangeRates = {
            CNY: { name: '人民币', rate: 1, flag: '🇨🇳' },
            USD: { name: '美元', rate: 0.140, flag: '🇺🇸' },
            EUR: { name: '欧元', rate: 0.127, flag: '🇪🇺' },
            GBP: { name: '英镑', rate: 0.109, flag: '🇬🇧' },
            JPY: { name: '日元', rate: 20.5, flag: '🇯🇵' },
            HKD: { name: '港币', rate: 1.08, flag: '🇭🇰' },
            AUD: { name: '澳元', rate: 0.208, flag: '🇦🇺' },
            CAD: { name: '加元', rate: 0.186, flag: '🇨🇦' },
            SGD: { name: '新加坡元', rate: 0.185, flag: '🇸🇬' },
            KRW: { name: '韩元', rate: 180.5, flag: '🇰🇷' }
        };
        
        // 要显示的目标货币列表
        const targetCurrencies = ['USD', 'EUR', 'GBP', 'JPY', 'HKD', 'AUD', 'CAD', 'SGD', 'KRW'];
        
        // 获取DOM元素
        const baseAmount = document.getElementById('baseAmount');
        const baseCurrency = document.getElementById('baseCurrency');
        const currencyGrid = document.getElementById('currencyGrid');
        const resetBtn = document.getElementById('resetBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const lastUpdated = document.getElementById('lastUpdated');
        
        // 格式化数字
        function formatNumber(num, decimals = 2) {
            return num.toLocaleString('zh-CN', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }
        
        // 格式化货币金额
        function formatCurrency(amount, currencyCode) {
            return amount.toLocaleString('zh-CN', {
                style: 'currency',
                currency: currencyCode,
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        
        // 计算并显示多币种汇率
        function calculateMultiCurrency() {
            const baseAmountValue = parseFloat(baseAmount.value) || 0;
            const baseCurrencyCode = baseCurrency.value;
            const baseRate = exchangeRates[baseCurrencyCode].rate;
            
            // 清空当前网格
            currencyGrid.innerHTML = '';
            
            // 为每个目标货币创建卡片
            targetCurrencies.forEach(targetCode => {
                if (targetCode === baseCurrencyCode) return;
                
                const targetRate = exchangeRates[targetCode].rate;
                const rate = targetRate / baseRate; // 直接汇率
                const convertedAmount = baseAmountValue * rate;
                
                // 创建货币卡片
                const card = document.createElement('div');
                card.className = 'currency-card';
                
                // 计算其他常见金额
                const amount100 = 100 * rate;
                const amount500 = 500 * rate;
                const amount1000 = 1000 * rate;
                const amount5000 = 5000 * rate;
                
                card.innerHTML = `
                    <div class="currency-header">
                        <div class="currency-flag">${exchangeRates[targetCode].flag}</div>
                        <div class="currency-info">
                            <div class="currency-code">${targetCode}</div>
                            <div class="currency-name">${exchangeRates[targetCode].name}</div>
                        </div>
                    </div>
                    
                    <div class="rate-display">
                        <div class="rate-amount">${formatNumber(rate, 4)}</div>
                        <div class="rate-label">1 ${baseCurrencyCode} = ${rate.toFixed(4)} ${targetCode}</div>
                    </div>
                    
                    <div class="converted-amounts">
                        <div class="amount-item">
                            <div class="amount-value">${formatNumber(convertedAmount, 2)}</div>
                            <div class="amount-label">${baseAmountValue} ${baseCurrencyCode}</div>
                        </div>
                        <div class="amount-item">
                            <div class="amount-value">${formatNumber(amount100, 2)}</div>
                            <div class="amount-label">100 ${baseCurrencyCode}</div>
                        </div>
                        <div class="amount-item">
                            <div class="amount-value">${formatNumber(amount500, 2)}</div>
                            <div class="amount-label">500 ${baseCurrencyCode}</div>
                        </div>
                        <div class="amount-item">
                            <div class="amount-value">${formatNumber(amount1000, 2)}</div>
                            <div class="amount-label">1000 ${baseCurrencyCode}</div>
                        </div>
                    </div>
                `;
                
                currencyGrid.appendChild(card);
            });
            
            // 更新时间
            updateLastUpdated();
        }
        
        // 重置
        function reset() {
            baseAmount.value = '100';
            baseCurrency.value = 'CNY';
            calculateMultiCurrency();
            
            resetBtn.style.transform = 'rotate(360deg)';
            setTimeout(() => {
                resetBtn.style.transform = '';
            }, 300);
        }
        
        // 刷新汇率（模拟）
        function refreshRates() {
            // 这里可以添加真实的API调用
            // 暂时使用预设数据
            lastUpdated.textContent = '正在获取最新汇率...';
            
            setTimeout(() => {
                calculateMultiCurrency();
                lastUpdated.textContent = '汇率已更新至最新';
                
                refreshBtn.innerHTML = '<span>✅</span> 刷新成功';
                setTimeout(() => {
                    refreshBtn.innerHTML = '<span>🔄</span> 刷新汇率';
                }, 2000);
            }, 1000);
        }
        
        // 更新最后更新时间
        function updateLastUpdated() {
            const now = new Date();
            const options = {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const dateStr = now.toLocaleDateString('zh-CN', options) + ' GMT+8';
            lastUpdated.textContent = `最后更新: ${dateStr}`;
        }
        
        // 事件监听
        baseAmount.addEventListener('input', calculateMultiCurrency);
        baseCurrency.addEventListener('change', calculateMultiCurrency);
        resetBtn.addEventListener('click', reset);
        refreshBtn.addEventListener('click', refreshRates);
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                reset();
            }
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                refreshRates();
            }
        });
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            calculateMultiCurrency();
            updateLastUpdated();
        });
    </script>
</body>
</html>
