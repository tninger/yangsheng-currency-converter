<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时汇率换算器 - 紧凑版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💱</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 15px;
            font-size: 14px;
        }
        
        .container { 
            max-width: 500px; 
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .currency-icon { font-size: 32px; margin-bottom: 8px; }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 5px; }
        .subtitle { font-size: 13px; opacity: 0.9; }
        
        .input-section {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .input-label {
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }
        
        .amount-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            min-width: 80px;
        }
        
        .currency-select {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 140px;
        }
        
        .currency-list {
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .currency-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #f5f5f5;
            transition: background-color 0.2s ease;
        }
        
        .currency-item:hover {
            background-color: #f8f9fa;
        }
        
        .currency-item:last-child {
            border-bottom: none;
        }
        
        .currency-flag {
            font-size: 20px;
            width: 30px;
            text-align: center;
        }
        
        .currency-details {
            flex: 1;
            display: grid;
            grid-template-columns: 80px 1fr 100px;
            gap: 10px;
            align-items: center;
        }
        
        .currency-code {
            font-weight: 700;
            color: #333;
            font-size: 14px;
        }
        
        .amount-display {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            font-size: 15px;
            color: #667eea;
            text-align: right;
        }
        
        .rate-display {
            font-family: 'Courier New', monospace;
            font-weight: 500;
            font-size: 13px;
            color: #666;
            text-align: left;
        }
        
        .currency-name {
            font-size: 11px;
            color: #888;
            display: block;
            margin-top: 2px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }
        
        .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd8 0%, #6c4592 100%);
        }
        
        .btn-secondary {
            background: #fff;
            color: #666;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #f5f5f5;
        }
        
        .last-updated {
            text-align: center;
            color: #666;
            font-size: 12px;
            padding: 12px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
            opacity: 0.8;
        }
        
        /* 高亮当前基准货币 */
        .currency-item.base-currency {
            background-color: #e8f4ff;
            border-left: 3px solid #667eea;
            padding-left: 7px;
        }
        
        /* 滚动条样式 */
        .currency-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .currency-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .currency-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        
        .currency-list::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }
        
        /* 响应式调整 */
        @media (max-width: 520px) {
            .container { margin: 0 10px; }
            .currency-details { grid-template-columns: 70px 1fr 90px; gap: 8px; }
            .amount-input { font-size: 15px; padding: 8px 10px; }
            .currency-select { min-width: 120px; font-size: 13px; padding: 8px 10px; }
        }
        
        @media (max-width: 400px) {
            body { padding: 10px; }
            .currency-details { grid-template-columns: 60px 1fr 80px; }
            .amount-input { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="currency-icon">💱</div>
            <h1>实时汇率换算器</h1>
            <div class="subtitle">紧凑设计，一屏显示所有货币</div>
        </div>
        
        <div class="input-section">
            <label class="input-label">金额:</label>
            <input type="number" class="amount-input" id="baseAmount" value="100" min="0" step="0.01" placeholder="金额">
            <select class="currency-select" id="baseCurrency">
                <option value="CNY">人民币 (CNY)</option>
                <option value="USD">美元 (USD)</option>
                <option value="EUR">欧元 (EUR)</option>
                <option value="GBP">英镑 (GBP)</option>
                <option value="JPY">日元 (JPY)</option>
            </select>
        </div>
        
        <div class="currency-list" id="currencyList">
            <!-- 货币项目将通过JavaScript动态生成 -->
        </div>
        
        <div class="controls">
            <button class="btn btn-secondary" id="resetBtn">
                <span>🔄</span> 重置
            </button>
            <button class="btn btn-primary" id="refreshBtn">
                <span>🔄</span> 刷新
            </button>
        </div>
        
        <div class="last-updated" id="lastUpdated">
            最后更新: 正在获取汇率...
        </div>
    </div>

    <script>
        // 预设汇率数据
        const exchangeRates = {
            CNY: { name: '人民币', flag: '🇨🇳' },
            USD: { name: '美元', rate: 0.140, flag: '🇺🇸' },
            EUR: { name: '欧元', rate: 0.127, flag: '🇪🇺' },
            GBP: { name: '英镑', rate: 0.109, flag: '🇬🇧' },
            JPY: { name: '日元', rate: 20.5, flag: '🇯🇵' },
            HKD: { name: '港币', rate: 1.08, flag: '🇭🇰' },
            AUD: { name: '澳元', rate: 0.208, flag: '🇦🇺' },
            CAD: { name: '加元', rate: 0.186, flag: '🇨🇦' },
            SGD: { name: '新加坡元', rate: 0.185, flag: '🇸🇬' },
            KRW: { name: '韩元', rate: 180.5, flag: '🇰🇷' }
        };
        
        // 货币显示顺序
        const currencyOrder = ['CNY', 'USD', 'EUR', 'GBP', 'JPY', 'HKD', 'AUD', 'CAD', 'SGD', 'KRW'];
        
        // 获取DOM元素
        const baseAmount = document.getElementById('baseAmount');
        const baseCurrency = document.getElementById('baseCurrency');
        const currencyList = document.getElementById('currencyList');
        const resetBtn = document.getElementById('resetBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const lastUpdated = document.getElementById('lastUpdated');
        
        // 格式化数字
        function formatNumber(num, decimals = 2) {
            return num.toLocaleString('zh-CN', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }
        
        // 格式化汇率（根据不同货币调整小数位数）
        function formatRate(num) {
            if (num >= 100) return formatNumber(num, 0);
            if (num >= 10) return formatNumber(num, 2);
            if (num >= 1) return formatNumber(num, 3);
            return formatNumber(num, 4);
        }
        
        // 更新货币列表
        function updateCurrencyList() {
            const baseAmountValue = parseFloat(baseAmount.value) || 0;
            const baseCurrencyCode = baseCurrency.value;
            const baseRate = baseCurrencyCode === 'CNY' ? 1 : exchangeRates[baseCurrencyCode].rate;
            
            // 清空列表
            currencyList.innerHTML = '';
            
            // 为每种货币创建项目
            currencyOrder.forEach(currencyCode => {
                const currency = exchangeRates[currencyCode];
                
                // 计算汇率
                let rate = 1;
                if (currencyCode === baseCurrencyCode) {
                    rate = 1; // 相同货币汇率为1
                } else {
                    const targetRate = currency.rate || 1;
                    rate = targetRate / baseRate;
                }
                
                // 计算换算金额
                const convertedAmount = baseAmountValue * rate;
                
                // 创建货币项目
                const item = document.createElement('div');
                item.className = 'currency-item';
                if (currencyCode === baseCurrencyCode) {
                    item.classList.add('base-currency');
                }
                
                item.innerHTML = `
                    <div class="currency-flag">${currency.flag}</div>
                    <div class="currency-details">
                        <div class="currency-code">${currencyCode}
                            <span class="currency-name">${currency.name}</span>
                        </div>
                        <div class="amount-display">${formatNumber(convertedAmount, 2)}</div>
                        <div class="rate-display">${formatRate(rate)}</div>
                    </div>
                `;
                
                currencyList.appendChild(item);
            });
            
            // 更新时间
            updateLastUpdated();
        }
        
        // 重置
        function reset() {
            baseAmount.value = '100';
            baseCurrency.value = 'CNY';
            updateCurrencyList();
            
            resetBtn.style.transform = 'rotate(360deg)';
            setTimeout(() => {
                resetBtn.style.transform = '';
            }, 300);
        }
        
        // 刷新汇率
        function refreshRates() {
            lastUpdated.textContent = '正在更新汇率...';
            refreshBtn.innerHTML = '<span>⏳</span> 更新中';
            
            // 模拟API调用
            setTimeout(() => {
                updateCurrencyList();
                lastUpdated.textContent = '汇率已更新';
                
                refreshBtn.innerHTML = '<span>✅</span> 更新成功';
                setTimeout(() => {
                    refreshBtn.innerHTML = '<span>🔄</span> 刷新';
                }, 1500);
            }, 800);
        }
        
        // 更新最后更新时间
        function updateLastUpdated() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-CN', { 
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            }) + ' GMT+8';
            lastUpdated.textContent = `更新: ${dateStr}`;
        }
        
        // 事件监听
        baseAmount.addEventListener('input', updateCurrencyList);
        baseCurrency.addEventListener('change', updateCurrencyList);
        resetBtn.addEventListener('click', reset);
        refreshBtn.addEventListener('click', refreshRates);
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') reset();
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                refreshRates();
            }
        });
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            updateCurrencyList();
            updateLastUpdated();
        });
    </script>
</body>
</html>
