<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汇率换算器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💱</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            background: #667eea;
        }
        
        .container { 
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
        }
        
        /* 紧凑标题 - 自动高度 */
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        
        .currency-icon { font-size: 14px; flex-shrink: 0; }
        
        .title-text h1 { font-size: 12px; font-weight: 600; margin-bottom: 0; line-height: 1.1; }
        .title-text .subtitle { font-size: 8px; opacity: 0.9; line-height: 1; }
        
        /* 输入区域 */
        .input-section {
            padding: 3px 6px;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            gap: 4px;
            align-items: center;
            background: #f8f9fa;
            flex-shrink: 0;
        }
        
        .input-label { font-size: 9px; font-weight: 600; color: #333; white-space: nowrap; }
        
        .amount-input {
            flex: 1;
            padding: 3px 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            min-width: 50px;
        }
        
        .currency-select {
            padding: 3px 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 10px;
            background: white;
            cursor: pointer;
            min-width: 80px;
            flex: 1;
        }
        
        /* 货币列表 - 自适应高度，填满剩余空间 */
        .currency-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }
        
        .currency-item {
            display: flex;
            align-items: center;
            padding: 2px 6px;
            border-bottom: 1px solid #f0f0f0;
            min-height: 24px;
        }
        
        .currency-item:hover { background-color: #f5f5f5; }
        .currency-item:last-child { border-bottom: none; }
        
        .currency-flag { font-size: 12px; width: 18px; text-align: center; flex-shrink: 0; }
        
        .currency-details {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 3px;
            min-width: 0;
        }
        
        .currency-info {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        
        .currency-code { font-weight: 700; color: #333; font-size: 10px; white-space: nowrap; }
        .currency-name { font-size: 8px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .amount-display {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            font-size: 10px;
            color: #667eea;
            text-align: right;
            white-space: nowrap;
            min-width: 45px;
            flex-shrink: 0;
        }
        
        .rate-display {
            font-family: 'Courier New', monospace;
            font-weight: 500;
            font-size: 8px;
            color: #666;
            text-align: left;
            white-space: nowrap;
            min-width: 35px;
            flex-shrink: 0;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 3px;
            padding: 3px 6px;
            background: #f9f9f9;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0;
        }
        
        .btn {
            flex: 1;
            padding: 3px 5px;
            border: none;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd8; }
        
        .btn-secondary { background: white; color: #666; border: 1px solid #ccc; }
        .btn-secondary:hover { background: #f0f0f0; }
        
        .last-updated {
            text-align: center;
            color: #777;
            font-size: 7px;
            padding: 2px 6px;
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0;
        }
        
        /* 高亮基准货币 */
        .currency-item.base-currency {
            background-color: #e8f4ff;
            border-left: 2px solid #667eea;
            padding-left: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="currency-icon">💱</div>
            <div class="title-text">
                <h1>实时汇率换算器</h1>
                <div class="subtitle">紧凑设计，一屏显示所有货币</div>
            </div>
        </div>
        
        <div class="input-section">
            <label class="input-label">金额:</label>
            <input type="number" class="amount-input" id="baseAmount" value="100" min="0" step="0.01" placeholder="金额">
            <select class="currency-select" id="baseCurrency">
                <option value="CNY">人民币</option>
                <option value="USD">美元</option>
                <option value="EUR">欧元</option>
                <option value="GBP">英镑</option>
                <option value="JPY">日元</option>
            </select>
        </div>
        
        <div class="currency-list" id="currencyList">
            <!-- 货币项目将通过JavaScript动态生成 -->
        </div>
        
        <div class="controls">
            <button class="btn btn-secondary" id="resetBtn">
                <span>↻</span> 重置
            </button>
            <button class="btn btn-primary" id="refreshBtn">
                <span>↻</span> 刷新
            </button>
        </div>
        
        <div class="last-updated" id="lastUpdated">
            更新: 正在获取
        </div>
    </div>

    <script>
        // 预设汇率数据
        const exchangeRates = {
            CNY: { name: '人民币', flag: '🇨🇳' },
            USD: { name: '美元', rate: 0.140, flag: '🇺🇸' },
            EUR: { name: '欧元', rate: 0.127, flag: '🇪🇺' },
            GBP: { name: '英镑', rate: 0.109, flag: '🇬🇧' },
            JPY: { name: '日元', rate: 20.5, flag: '🇯🇵' },
            HKD: { name: '港币', rate: 1.08, flag: '🇭🇰' },
            AUD: { name: '澳元', rate: 0.208, flag: '🇦🇺' },
            CAD: { name: '加元', rate: 0.186, flag: '🇨🇦' },
            SGD: { name: '新加坡元', rate: 0.185, flag: '🇸🇬' },
            KRW: { name: '韩元', rate: 180.5, flag: '🇰🇷' }
        };
        
        // 货币显示顺序
        const currencyOrder = ['CNY', 'USD', 'EUR', 'GBP', 'JPY', 'HKD', 'AUD', 'CAD', 'SGD', 'KRW'];
        
        // 获取DOM元素
        const baseAmount = document.getElementById('baseAmount');
        const baseCurrency = document.getElementById('baseCurrency');
        const currencyList = document.getElementById('currencyList');
        const resetBtn = document.getElementById('resetBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const lastUpdated = document.getElementById('lastUpdated');
        
        // 格式化数字
        function formatNumber(num, decimals = 2) {
            return num.toLocaleString('zh-CN', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }
        
        // 格式化汇率
        function formatRate(num) {
            if (num >= 100) return formatNumber(num, 0);
            if (num >= 10) return formatNumber(num, 2);
            if (num >= 1) return formatNumber(num, 3);
            return formatNumber(num, 4);
        }
        
        // 更新货币列表
        function updateCurrencyList() {
            const baseAmountValue = parseFloat(baseAmount.value) || 0;
            const baseCurrencyCode = baseCurrency.value;
            const baseRate = baseCurrencyCode === 'CNY' ? 1 : exchangeRates[baseCurrencyCode].rate;
            
            currencyList.innerHTML = '';
            
            currencyOrder.forEach(currencyCode => {
                const currency = exchangeRates[currencyCode];
                
                let rate = 1;
                if (currencyCode === baseCurrencyCode) {
                    rate = 1;
                } else {
                    const targetRate = currency.rate || 1;
                    rate = targetRate / baseRate;
                }
                
                const convertedAmount = baseAmountValue * rate;
                
                const item = document.createElement('div');
                item.className = 'currency-item';
                if (currencyCode === baseCurrencyCode) {
                    item.classList.add('base-currency');
                }
                
                item.innerHTML = `
                    <div class="currency-flag">${currency.flag}</div>
                    <div class="currency-details">
                        <div class="currency-info">
                            <span class="currency-code">${currencyCode}</span>
                            <span class="currency-name">${currency.name}</span>
                        </div>
                        <div class="amount-display">${formatNumber(convertedAmount, 2)}</div>
                        <div class="rate-display">${formatRate(rate)}</div>
                    </div>
                `;
                
                currencyList.appendChild(item);
            });
            
            updateLastUpdated();
        }
        
        // 重置
        function reset() {
            baseAmount.value = '100';
            baseCurrency.value = 'CNY';
            updateCurrencyList();
            
            resetBtn.style.transform = 'rotate(360deg)';
            setTimeout(() => {
                resetBtn.style.transform = '';
            }, 200);
        }
        
        // 刷新汇率
        function refreshRates() {
            lastUpdated.textContent = '更新中...';
            refreshBtn.innerHTML = '<span>⏳</span> 更新';
            
            setTimeout(() => {
                updateCurrencyList();
                lastUpdated.textContent = '已更新';
                
                refreshBtn.innerHTML = '<span>✓</span> 成功';
                setTimeout(() => {
                    refreshBtn.innerHTML = '<span>↻</span> 刷新';
                }, 1000);
            }, 600);
        }
        
        // 更新最后更新时间
        function updateLastUpdated() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            lastUpdated.textContent = `更新: ${timeStr}`;
        }
        
        // 事件监听
        baseAmount.addEventListener('input', updateCurrencyList);
        baseCurrency.addEventListener('change', updateCurrencyList);
        resetBtn.addEventListener('click', reset);
        refreshBtn.addEventListener('click', refreshRates);
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') reset();
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                refreshRates();
            }
            if (e.key === 'Enter') updateCurrencyList();
        });
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            updateCurrencyList();
            updateLastUpdated();
        });
        
        // 窗口大小改变时重新计算
        window.addEventListener('resize', () => {
            // 强制重新渲染以确保适应新高度
            document.body.style.height = window.innerHeight + 'px';
        });
    </script>
</body>
</html>
