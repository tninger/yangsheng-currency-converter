<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汇率换算</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8edf5 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 32px;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .update-time {
            background: #e6fffa;
            border: 1px solid #81e6d9;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #234e52;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .currency-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        @media (max-width: 640px) {
            .currency-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .currency-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0fff4;
            border: 1px solid #c6f6d5;
            border-radius: 10px;
            padding: 12px 16px;
            transition: all 0.2s ease;
        }
        
        .currency-row:hover {
            background: #e6ffed;
            border-color: #9ae6b4;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(72, 187, 120, 0.15);
        }
        
        .currency-code {
            font-weight: 600;
            color: #2d3748;
            min-width: 36px;
            font-size: 13px;
        }
        
        .currency-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 500;
            color: #1a202c;
            padding: 4px 0;
            outline: none;
            font-family: 'SF Mono', Monaco, monospace;
        }
        
        .currency-input::placeholder {
            color: #a0aec0;
        }
        
        .currency-name {
            background: #68d391;
            color: white;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 500;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        
        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 24px 0;
        }
        
        .footer-note {
            background: #f7fafc;
            border-radius: 10px;
            padding: 16px;
            font-size: 13px;
            color: #4a5568;
            margin-top: 24px;
        }
        
        .footer-note strong {
            color: #2d3748;
            font-weight: 600;
        }
        
        .icon {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#48bb78" stroke-width="2">
                <path d="M12 2v20M2 12h20M17 12a5 5 0 00-10 0M12 7a5 5 0 0010 0"/>
            </svg>
            汇率换算
        </h1>
        <p class="subtitle">简单的汇率换算工具，汇率参考数据，仅供参考。</p>
        
        <div class="update-time">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
            </svg>
            汇率更新时间: 2025-01-20 10:00:00 (仅供参考)
        </div>
        
        <div class="currency-grid" id="currencyGrid"></div>
        
        <div class="divider"></div>
        
        <div class="footer-note">
            <strong>汇率工具说明</strong><br>
            • 功能说明：汇率参考常见市场汇率，非实时交易数据，仅供参考。<br>
            • 新手提示：在任意输入框输入数值，其他货币会自动换算。<br>
            • 免责声明：汇率随时波动，请以银行实际交易汇率为准。
        </div>
    </div>

    <script>
        // 货币配置: [代码, 名称, 对USD汇率]
        const currencies = [
            ['CNY', '人民币[中国¥]', 0.1388],
            ['TWD', '台币[中国台湾NT$]', 0.0306],
            ['RUB', '卢布[俄罗斯₽]', 0.0109],
            ['INR', '卢比[印度₹]', 0.0117],
            ['JPY', '日元[日本¥]', 0.0065],
            ['SGD', '新元[新加坡S$]', 0.744],
            ['ARS', '比索[阿根廷$]', 0.001],
            ['KRW', '韩元[韩国₩]', 0.0007],
            ['AUD', '澳元[澳大利亚A$]', 0.626],
            ['THB', '泰铢[泰国฿]', 0.0296],
            ['CAD', '加元[加拿大C$]', 0.694],
            ['MXN', '比索[墨西哥$]', 0.0494],
            ['MYR', '林吉特[马来西亚RM]', 0.224],
            ['XAU', '国际黄金[克g]', 85.47],
            ['HKD', '港元[中国香港HK$]', 0.128],
            ['USD', '美元[美国$]', 1],
            ['EUR', '欧元[欧盟€]', 1.049],
            ['VND', '越南盾[越南₫]', 0.00004],
            ['GBP', '英镑[英国£]', 1.262],
            ['PHP', '比索[菲律宾₱]', 0.0171],
            ['TRY', '里拉[土耳其₺]', 0.0287],
            ['CHF', '法郎[瑞士Fr]', 1.13],
            ['IDR', '印尼盾[印度尼西亚Rp]', 0.00006],
            ['PKR', '卢比[巴基斯坦Rs]', 0.0036],
            ['SAR', '里亚尔[沙特阿拉伯SR]', 0.267],
            ['BDT', '塔卡[孟加拉国৳]', 0.0083],
            ['BTC', '比特币[仅供参考]', 105000]
        ];

        // 生成HTML
        function init() {
            const grid = document.getElementById('currencyGrid');
            
            currencies.forEach(([code, name, rate]) => {
                const row = document.createElement('div');
                row.className = 'currency-row';
                row.innerHTML = `
                    <span class="currency-code">${code}</span>
                    <input type="number" class="currency-input" id="${code}" 
                           placeholder="0.00" step="any" data-rate="${rate}">
                    <span class="currency-name">${name}</span>
                `;
                grid.appendChild(row);
            });

            // 绑定事件
            currencies.forEach(([code]) => {
                const input = document.getElementById(code);
                input.addEventListener('input', () => convertFrom(code));
            });
        }

        // 换算逻辑
        function convertFrom(sourceCode) {
            const sourceInput = document.getElementById(sourceCode);
            const sourceValue = parseFloat(sourceInput.value);
            
            if (isNaN(sourceValue) || sourceValue === 0) {
                // 清空所有
                currencies.forEach(([code]) => {
                    if (code !== sourceCode) {
                        document.getElementById(code).value = '';
                    }
                });
                return;
            }

            const sourceRate = parseFloat(sourceInput.dataset.rate);
            const baseUSD = sourceValue / sourceRate; // 换算成USD

            currencies.forEach(([code, , rate]) => {
                if (code !== sourceCode) {
                    const targetInput = document.getElementById(code);
                    const converted = baseUSD * rate;
                    // 格式化数字
                    targetInput.value = formatNumber(converted);
                }
            });
        }

        // 数字格式化
        function formatNumber(num) {
            if (num >= 1) {
                return num.toFixed(2).replace(/\.00$/, '');
            } else if (num >= 0.01) {
                return num.toFixed(4).replace(/0+$/, '').replace(/\.$/, '');
            } else {
                return num.toFixed(6).replace(/0+$/, '').replace(/\.$/, '');
            }
        }

        // 初始化
        init();
    </script>
</body>
</html>
