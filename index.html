<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时汇率换算器 - 一屏全览</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .currency-icon { font-size: 48px; margin-bottom: 10px; }
        h1 { font-size: 28px; color: white; margin-bottom: 5px; }
        .subtitle { color: rgba(255,255,255,0.9); font-size: 16px; }
        
        .control-panel {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .input-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .input-label {
            font-weight: 600;
            color: #333;
            min-width: 120px;
        }
        
        .amount-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 500;
        }
        
        .currency-select {
            min-width: 150px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }
        
        .currency-display {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            flex: 1;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }
        
        .currency-table-container {
            flex: 1;
            overflow: auto;
        }
        
        .currency-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        
        .currency-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .currency-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 16px;
        }
        
        .currency-table th:first-child {
            border-top-left-radius: 10px;
        }
        
        .currency-table th:last-child {
            border-top-right-radius: 10px;
        }
        
        .currency-table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s ease;
        }
        
        .currency-table tbody tr:hover {
            background-color: #f8f9fa;
        }
        
        .currency-table tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        
        .currency-table tbody tr:hover {
            background-color: #e9ecef;
        }
        
        .currency-table td {
            padding: 15px;
            font-size: 16px;
        }
        
        .currency-flag-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .currency-flag {
            font-size: 24px;
        }
        
        .currency-info {
            display: flex;
            flex-direction: column;
        }
        
        .currency-code {
            font-weight: 700;
            color: #333;
            font-size: 16px;
        }
        
        .currency-name {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }
        
        .rate-cell {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            font-size: 18px;
            color: #333;
        }
        
        .amount-cell {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            font-size: 18px;
            color: #667eea;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
            border: 2px solid #e0e0e0;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
        }
        
        .last-updated {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        
        .currency-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        
        .currency-tag {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .table-header-group {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
            justify-content: space-between;
        }
        
        .table-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }
        
        .table-stats {
            font-size: 14px;
            color: #666;
        }
        
        @media (max-width: 1200px) {
            .container { max-width: 95%; }
        }
        
        @media (max-width: 992px) {
            .input-group { flex-direction: column; align-items: stretch; }
            .currency-select { width: 100%; }
            .currency-table { min-width: 100%; }
            .currency-table th, .currency-table td { padding: 12px 10px; }
        }
        
        @media (max-width: 768px) {
            .currency-table { font-size: 14px; }
            .currency-table th, .currency-table td { padding: 10px 8px; }
            .rate-cell, .amount-cell { font-size: 16px; }
        }
        
        /* 滚动条样式 */
        .currency-table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        .currency-table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        .currency-table-container::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }
        
        .currency-table-container::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="currency-icon">💰</div>
            <h1>实时汇率换算器</h1>
            <div class="subtitle">一屏全览所有币种汇率，实时更新</div>
        </div>
        
        <div class="control-panel">
            <div class="input-group">
                <label class="input-label">基准金额：</label>
                <input type="number" class="amount-input" id="baseAmount" value="100" min="0" step="0.01" placeholder="输入金额">
                <label class="input-label">基准货币：</label>
                <select class="currency-select" id="baseCurrency">
                    <option value="CNY">🇨🇳 人民币 (CNY)</option>
                    <option value="USD">🇺🇸 美元 (USD)</option>
                    <option value="EUR">🇪🇺 欧元 (EUR)</option>
                    <option value="GBP">🇬🇧 英镑 (GBP)</option>
                    <option value="JPY">🇯🇵 日元 (JPY)</option>
                </select>
            </div>
            
            <div class="controls">
                <button class="btn btn-secondary" id="resetBtn">
                    <span>🔄</span> 重置
                </button>
                <button class="btn btn-primary" id="refreshBtn">
                    <span>🔄</span> 刷新汇率
                </button>
            </div>
        </div>
        
        <div class="currency-display">
            <div class="table-header-group">
                <div class="table-title">💰 多币种汇率实时显示</div>
                <div class="table-stats" id="tableStats">共10种货币，实时更新</div>
            </div>
            
            <div class="currency-table-container">
                <table class="currency-table" id="currencyTable">
                    <thead>
    <tr>
<th width="20%">货币</th>
<th width="20%">换算金额</th>
<th width="20%">汇率 (1单位基准货币)</th>
<th width="20%">100单位换算</th>
<th width="20%">1000单位换算</th>
    </tr>
  </thead>
                    <tbody id="currencyTableBody">
                        <!-- 汇率数据将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="last-updated" id="lastUpdated">
            最后更新: 正在获取最新汇率...
        </div>
    </div>

    <script>
        // 预设汇率数据
        const exchangeRates = {
            CNY: { name: '人民币', rate: 1, flag: '🇨🇳' },
            USD: { name: '美元', rate: 0.140, flag: '🇺🇸' },
            EUR: { name: '欧元', rate: 0.127, flag: '🇪🇺' },
            GBP: { name: '英镑', rate: 0.109, flag: '🇬🇧' },
            JPY: { name: '日元', rate: 20.5, flag: '🇯🇵' },
            HKD: { name: '港币', rate: 1.08, flag: '🇭🇰' },
            AUD: { name: '澳元', rate: 0.208, flag: '🇦🇺' },
            CAD: { name: '加元', rate: 0.186, flag: '🇨🇦' },
            SGD: { name: '新加坡元', rate: 0.185, flag: '🇸🇬' },
            KRW: { name: '韩元', rate: 180.5, flag: '🇰🇷' }
        };
        
        // 货币列表（按常用顺序）
        const currencyList = ['CNY', 'USD', 'EUR', 'GBP', 'JPY', 'HKD', 'AUD', 'CAD', 'SGD', 'KRW'];
        
        // 获取DOM元素
        const baseAmount = document.getElementById('baseAmount');
        const baseCurrency = document.getElementById('baseCurrency');
        const currencyTableBody = document.getElementById('currencyTableBody');
        const tableStats = document.getElementById('tableStats');
        const resetBtn = document.getElementById('resetBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const lastUpdated = document.getElementById('lastUpdated');
        
        // 格式化数字
        function formatNumber(num, decimals = 2) {
            return num.toLocaleString('zh-CN', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }
        
        // 格式化汇率（根据不同货币调整小数位数）
        function formatRate(num) {
            if (num >= 100) {
                return formatNumber(num, 0);
            } else if (num >= 10) {
                return formatNumber(num, 2);
            } else if (num >= 1) {
                return formatNumber(num, 3);
            } else {
                return formatNumber(num, 4);
            }
        }
        
        // 更新汇率表格
        function updateCurrencyTable() {
            const baseAmountValue = parseFloat(baseAmount.value) || 0;
            const baseCurrencyCode = baseCurrency.value;
            const baseRate = exchangeRates[baseCurrencyCode].rate;
            
            // 清空表格
            currencyTableBody.innerHTML = '';
            
            // 为每种货币创建行
            currencyList.forEach(currencyCode => {
                const currency = exchangeRates[currencyCode];
                
                // 计算汇率
                let rate = 1;
                if (currencyCode === baseCurrencyCode) {
                    rate = 1; // 相同货币汇率为1
                } else {
                    rate = currency.rate / baseRate;
                }
                
                // 计算各种金额
                const convertedAmount = baseAmountValue * rate;
                const amount100 = 100 * rate;
                const amount1000 = 1000 * rate;
                
                // 创建表格行
                const row = document.createElement('tr');
                row.innerHTML = `<td>
                        <div class="currency-flag-cell">
                            <div class="currency-flag">${currency.flag}</div>
                            <div class="currency-info">
                                <div class="currency-code">${currencyCode}</div>
                                <div class="currency-name">${currency.name}</div>
                            </div>
                        </div>
                    </td>
                    <td class="amount-cell">${formatNumber(convertedAmount, 2)}</td>
                    <td class="rate-cell">${formatRate(rate)}</td>
                    <td class="amount-cell">${formatNumber(amount100, 2)}</td>
                    <td class="amount-cell">${formatNumber(amount1000, 2)}</td>`;
                
                // 高亮当前选择的基准货币
                if (currencyCode === baseCurrencyCode) {
                    row.style.backgroundColor = '#e8f4ff';
                    row.style.fontWeight = 'bold';
                }
                
                currencyTableBody.appendChild(row);
            });
            
            // 更新表格统计
            tableStats.textContent = `共 ${currencyList.length} 种货币 | 基准货币: ${baseCurrencyCode}`;
            
            // 更新时间
            updateLastUpdated();
        }
        
        // 重置
        function reset() {
            baseAmount.value = '100';
            baseCurrency.value = 'CNY';
            updateCurrencyTable();
            
            resetBtn.style.transform = 'rotate(360deg)';
            setTimeout(() => {
                resetBtn.style.transform = '';
            }, 300);
        }
        
        // 刷新汇率
        function refreshRates() {
            lastUpdated.textContent = '正在获取最新汇率...';
            refreshBtn.innerHTML = '<span>⏳</span> 更新中...';
            
            // 模拟API调用延迟
            setTimeout(() => {
                updateCurrencyTable();
                lastUpdated.textContent = '汇率已更新至最新';
                
                refreshBtn.innerHTML = '<span>✅</span> 更新成功';
                setTimeout(() => {
                    refreshBtn.innerHTML = '<span>🔄</span> 刷新汇率';
                }, 2000);
            }, 1000);
        }
        
        // 更新最后更新时间
        function updateLastUpdated() {
            const now = new Date();
            const options = {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const dateStr = now.toLocaleDateString('zh-CN', options) + ' GMT+8';
            lastUpdated.textContent = `最后更新: ${dateStr}`;
        }
        
        // 事件监听
        baseAmount.addEventListener('input', updateCurrencyTable);
        baseCurrency.addEventListener('change', updateCurrencyTable);
        resetBtn.addEventListener('click', reset);
        refreshBtn.addEventListener('click', refreshRates);
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                reset();
            }
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                refreshRates();
            }
            if (e.key === 'Enter') {
                updateCurrencyTable();
            }
        });
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            updateCurrencyTable();
            updateLastUpdated();
        });
    </script>
</body>
</html>
