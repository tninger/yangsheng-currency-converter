<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汇率换算器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💱</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #667eea;
            min-height: 100vh;
            padding: 0;
            font-size: 13px;
        }
        
        .container { 
            width: 100%;
            max-width: 100%;
            background: white;
            overflow: hidden;
        }
        
        /* 紧凑标题 */
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #5a6fd8;
        }
        
        .currency-icon { 
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .title-text { 
            flex: 1;
        }
        
        .title-text h1 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 1px;
            line-height: 1.2;
        }
        
        .title-text .subtitle {
            font-size: 9px;
            opacity: 0.9;
            line-height: 1.1;
        }
        
        /* 输入区域 */
        .input-section {
            padding: 6px 8px;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            gap: 6px;
            align-items: center;
            background: #f8f9fa;
        }
        
        .input-label {
            font-size: 10px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }
        
        .amount-input {
            flex: 1;
            padding: 5px 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            min-width: 50px;
            max-width: 80px;
        }
        
        .currency-select {
            padding: 5px 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 11px;
            background: white;
            cursor: pointer;
            min-width: 100px;
            flex: 1;
        }
        
        /* 占满宽度的货币列表 */
        .currency-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .currency-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
            min-height: 34px;
            width: 100%;
        }
        
        .currency-item:hover {
            background-color: #f5f5f5;
        }
        
        .currency-item:last-child {
            border-bottom: none;
        }
        
        .currency-flag {
            font-size: 16px;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .currency-details {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            width: 100%;
            min-width: 0;
        }
        
        .currency-info {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        
        .currency-code {
            font-weight: 700;
            color: #333;
            font-size: 11px;
            white-space: nowrap;
        }
        
        .currency-name {
            font-size: 9px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .amount-display {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            font-size: 12px;
            color: #667eea;
            text-align: right;
            white-space: nowrap;
            min-width: 55px;
            flex-shrink: 0;
        }
        
        .rate-display {
            font-family: 'Courier New', monospace;
            font-weight: 500;
            font-size: 10px;
            color: #666;
            text-align: left;
            white-space: nowrap;
            min-width: 45px;
            flex-shrink: 0;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 6px;
            padding: 6px 8px;
            background: #f9f9f9;
            border-top: 1px solid #e0e0e0;
        }
        
        .btn {
            flex: 1;
            padding: 5px 8px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a6fd8;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 1px solid #ccc;
        }
        
        .btn-secondary:hover {
            background: #f0f0f0;
        }
        
        .last-updated {
            text-align: center;
            color: #777;
            font-size: 9px;
            padding: 5px;
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
        }
        
        /* 高亮基准货币 */
        .currency-item.base-currency {
            background-color: #e8f4ff;
            border-left: 2px solid #667eea;
            padding-left: 6px;
        }
        
        /* 滚动条 */
        .currency-list::-webkit-scrollbar {
            width: 3px;
        }
        
        .currency-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .currency-list::-webkit-scrollbar-thumb {
            background: #ccc;
        }
        
        .currency-list::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }
        
        /* 响应式调整 - 确保始终占满宽度 */
        @media (max-width: 480px) {
            .header { padding: 5px 6px; }
            .input-section { padding: 5px 6px; }
            .currency-item { padding: 5px 6px; }
            .currency-details { gap: 3px; }
            .amount-display { min-width: 50px; font-size: 11px; }
            .rate-display { min-width: 40px; font-size: 9px; }
            .currency-code { font-size: 10px; }
            .currency-name { font-size: 8px; }
            .controls { padding: 5px 6px; }
        }
        
        @media (max-width: 360px) {
            .amount-display { min-width: 45px; font-size: 10px; }
            .rate-display { min-width: 35px; font-size: 8px; }
            .currency-flag { width: 20px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="currency-icon">💱</div>
            <div class="title-text">
                <h1>实时汇率换算器</h1>
                <div class="subtitle">紧凑设计，一屏显示所有货币</div>
            </div>
        </div>
        
        <div class="input-section">
            <label class="input-label">金额:</label>
            <input type="number" class="amount-input" id="baseAmount" value="100" min="0" step="0.01" placeholder="金额">
            <select class="currency-select" id="baseCurrency">
                <option value="CNY">人民币</option>
                <option value="USD">美元</option>
                <option value="EUR">欧元</option>
                <option value="GBP">英镑</option>
                <option value="JPY">日元</option>
            </select>
        </div>
        
        <div class="currency-list" id="currencyList">
            <!-- 货币项目将通过JavaScript动态生成 -->
        </div>
        
        <div class="controls">
            <button class="btn btn-secondary" id="resetBtn">
                <span>↻</span> 重置
            </button>
            <button class="btn btn-primary" id="refreshBtn">
                <span>↻</span> 刷新
            </button>
        </div>
        
        <div class="last-updated" id="lastUpdated">
            更新: 正在获取
        </div>
    </div>

    <script>
        // 预设汇率数据
        const exchangeRates = {
            CNY: { name: '人民币', flag: '🇨🇳' },
            USD: { name: '美元', rate: 0.140, flag: '🇺🇸' },
            EUR: { name: '欧元', rate: 0.127, flag: '🇪🇺' },
            GBP: { name: '英镑', rate: 0.109, flag: '🇬🇧' },
            JPY: { name: '日元', rate: 20.5, flag: '🇯🇵' },
            HKD: { name: '港币', rate: 1.08, flag: '🇭🇰' },
            AUD: { name: '澳元', rate: 0.208, flag: '🇦🇺' },
            CAD: { name: '加元', rate: 0.186, flag: '🇨🇦' },
            SGD: { name: '新加坡元', rate: 0.185, flag: '🇸🇬' },
            KRW: { name: '韩元', rate: 180.5, flag: '🇰🇷' }
        };
        
        // 货币显示顺序
        const currencyOrder = ['CNY', 'USD', 'EUR', 'GBP', 'JPY', 'HKD', 'AUD', 'CAD', 'SGD', 'KRW'];
        
        // 获取DOM元素
        const baseAmount = document.getElementById('baseAmount');
        const baseCurrency = document.getElementById('baseCurrency');
        const currencyList = document.getElementById('currencyList');
        const resetBtn = document.getElementById('resetBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const lastUpdated = document.getElementById('lastUpdated');
        
        // 格式化数字
        function formatNumber(num, decimals = 2) {
            return num.toLocaleString('zh-CN', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }
        
        // 格式化汇率
        function formatRate(num) {
            if (num >= 100) return formatNumber(num, 0);
            if (num >= 10) return formatNumber(num, 2);
            if (num >= 1) return formatNumber(num, 3);
            return formatNumber(num, 4);
        }
        
        // 更新货币列表
        function updateCurrencyList() {
            const baseAmountValue = parseFloat(baseAmount.value) || 0;
            const baseCurrencyCode = baseCurrency.value;
            const baseRate = baseCurrencyCode === 'CNY' ? 1 : exchangeRates[baseCurrencyCode].rate;
            
            currencyList.innerHTML = '';
            
            currencyOrder.forEach(currencyCode => {
                const currency = exchangeRates[currencyCode];
                
                // 计算汇率
                let rate = 1;
                if (currencyCode === baseCurrencyCode) {
                    rate = 1;
                } else {
                    const targetRate = currency.rate || 1;
                    rate = targetRate / baseRate;
                }
                
                // 计算换算金额
                const convertedAmount = baseAmountValue * rate;
                
                // 创建货币项目
                const item = document.createElement('div');
                item.className = 'currency-item';
                if (currencyCode === baseCurrencyCode) {
                    item.classList.add('base-currency');
                }
                
                item.innerHTML = `
                    <div class="currency-flag">${currency.flag}</div>
                    <div class="currency-details">
                        <div class="currency-info">
                            <span class="currency-code">${currencyCode}</span>
                            <span class="currency-name">${currency.name}</span>
                        </div>
                        <div class="amount-display">${formatNumber(convertedAmount, 2)}</div>
                        <div class="rate-display">${formatRate(rate)}</div>
                    </div>
                `;
                
                currencyList.appendChild(item);
            });
            
            updateLastUpdated();
        }
        
        // 重置
        function reset() {
            baseAmount.value = '100';
            baseCurrency.value = 'CNY';
            updateCurrencyList();
            
            resetBtn.style.transform = 'rotate(360deg)';
            setTimeout(() => {
                resetBtn.style.transform = '';
            }, 200);
        }
        
        // 刷新汇率
        function refreshRates() {
            lastUpdated.textContent = '更新中...';
            refreshBtn.innerHTML = '<span>⏳</span> 更新';
            
            setTimeout(() => {
                updateCurrencyList();
                lastUpdated.textContent = '已更新';
                
                refreshBtn.innerHTML = '<span>✓</span> 成功';
                setTimeout(() => {
                    refreshBtn.innerHTML = '<span>↻</span> 刷新';
                }, 1000);
            }, 600);
        }
        
        // 更新最后更新时间
        function updateLastUpdated() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            lastUpdated.textContent = `更新: ${timeStr}`;
        }
        
        // 事件监听
        baseAmount.addEventListener('input', updateCurrencyList);
        baseCurrency.addEventListener('change', updateCurrencyList);
        resetBtn.addEventListener('click', reset);
        refreshBtn.addEventListener('click', refreshRates);
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') reset();
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                refreshRates();
            }
            if (e.key === 'Enter') updateCurrencyList();
        });
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            updateCurrencyList();
            updateLastUpdated();
        });
    </script>
</body>
</html>
